services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Run as a single-node Replica Set so the oplog is available for Change Streams.
    # Why single-node RS instead of standalone: Change Streams require oplog, which
    # only exists in Replica Set or sharded clusters. A single-node RS is the
    # lightest configuration that satisfies this requirement without extra containers.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: teacher_erp
    healthcheck:
      # On first start, rs.status() throws because the RS is not yet initiated.
      # The catch block calls rs.initiate() once and succeeds; subsequent checks
      # just confirm rs.status().ok === 1.
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - |
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 40s

  server:
    build:
      context: .
      dockerfile: packages/app/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      # directConnection=true: driver connects to this node directly rather than
      # performing SRV/RS-discovery. Required when the RS member hostname (mongo)
      # is only resolvable inside the Docker network.
      MONGODB_URI: mongodb://mongo:27017/teacher_erp?replicaSet=rs0&directConnection=true
      CLIENT_ORIGIN: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-teacher-erp-dev-secret-change-in-production}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: packages/app/client/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
